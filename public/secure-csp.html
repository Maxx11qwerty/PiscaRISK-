<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure CSP Test</title>
    <!-- More secure CSP without unsafe-inline -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com;
        style-src 'self' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https: blob:;
        connect-src 'self' https://*.firebaseio.com https://*.googleapis.com https://*.gstatic.com wss://*.firebaseio.com https://api.openweathermap.org https://us-central1-piscarisk.cloudfunctions.net https://www.google-analytics.com;
        frame-src 'self' https://*.google.com https://*.gstatic.com https://recaptcha.google.com https://www.recaptcha.net https://www.google.com/recaptcha/ https://*.firebaseapp.com https://piscarisk.firebaseapp.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
    " />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()" />
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains; preload" />
</head>
<body>
    <h1>Secure CSP Test Page</h1>
    <p>This page has a more secure CSP configuration without unsafe-inline.</p>
    <p>Note: This configuration may break some React functionality in development mode.</p>
</body>
</html>
