<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Connectivity Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .warning { background-color: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>Network Connectivity Test</h1>
    <div id="results"></div>

    <script>
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }

        async function testConnectivity() {
            addResult('Testing network connectivity...', 'info');
            
            // Test Google Analytics
            try {
                const response = await fetch('https://www.google-analytics.com/g/collect', {
                    method: 'POST',
                    mode: 'no-cors',
                    body: 'test=1'
                });
                addResult('✅ Google Analytics: Reachable', 'success');
            } catch (error) {
                addResult(`❌ Google Analytics: ${error.message}`, 'error');
            }

            // Test OpenWeatherMap
            try {
                const response = await fetch('https://api.openweathermap.org/data/2.5/weather?lat=14.1104&lon=121.1446&appid=test&units=metric');
                addResult('✅ OpenWeatherMap: Reachable', 'success');
            } catch (error) {
                addResult(`❌ OpenWeatherMap: ${error.message}`, 'error');
            }

            // Test Firebase
            try {
                const response = await fetch('https://piscarisk.firebaseio.com/.json');
                addResult('✅ Firebase: Reachable', 'success');
            } catch (error) {
                addResult(`❌ Firebase: ${error.message}`, 'error');
            }

            // Test DNS Resolution
            addResult('Testing DNS resolution...', 'info');
            try {
                const response = await fetch('https://www.google.com');
                addResult('✅ DNS Resolution: Working', 'success');
            } catch (error) {
                addResult(`❌ DNS Resolution: ${error.message}`, 'error');
            }
        }

        // Run tests when page loads
        testConnectivity();
    </script>
</body>
</html>
